<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="title">자바스크립트</h1>
    <script>
      let firstName = "홍";
      let lastName = "길동";
      let fullName = firstName + " " + lastName;
      document.write(fullName + "<br>");

      let age = 20;
      document.write("나이는 " + age + "살입니다." + "<br>");

      let num = 0;
      if (num % 2 === 0) {
        document.write("짝수" + "<br>");
      } else {
        document.write("홀수" + "<br>");
      }

      let count = 1;
      while (count <= 5) {
        document.write("hello" + count + "<br>");
        count++;
      }

      for (let i = 1; i <= 5; i++) {
        document.write("hi" + i + "<br>");
      }

      function writeFunction() {
        document.write("함수입니다." + "<br>");
      }
      writeFunction();

      window.alert("경고창1");
      document.write(screen.width + "<br>");
      document.getElementById("title").style.color = "red";

      let i = 0;
      function count1() {
        i++;
        document.write("hello" + i + "<br>");
      }

      function first1() {
        i++;
        document.write("<h1>" + "bye" + "</h1>");
      }

      setTimeout(count1, 1000);
      setInterval(first1, 500);
    </script>
  </body>
</html>
